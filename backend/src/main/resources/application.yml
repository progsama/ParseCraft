spring:
  application:
    name: doc-analyzer-api
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:10MB}

server:
  port: ${PORT:8080}

app:
  upload:
    allowed-extensions: pdf,docx,txt
    max-chars-for-ai: ${APP_MAX_CHARS_FOR_AI:15000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    provider: ${AI_PROVIDER:openai}
    base-url: ${AI_BASE_URL:https://api.openai.com}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4o-mini}
    fallback-models: ${AI_FALLBACK_MODELS:}
    temperature: ${AI_TEMPERATURE:0.2}
    # Bard/multi-line JSON needs headroom; override via AI_MAX_TOKENS if you hit provider limits.
    max-tokens: ${AI_MAX_TOKENS:2048}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
